apiVersion: v1
kind: ReplicationController
metadata:
  labels:
    run: myrs
  name: myrs
spec:
  replicas: 3
  selector:
      app: dev
  template:
    metadata:
      labels:
        app: dev
    spec:  
      containers:
      - image: ubuntu:22.04
        name: rs
        command: ["sleep","3600"]
