apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: my-nginx-deployment
  name: my-nginx-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web
  strategy: {}
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
      - image: nginx:latest
        name: nginx
        ports: 
        - containerPort: 80
        resources: {}
status: {}
